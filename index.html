<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <!-- 智能採買 v1.2.21 (捲軸重置與穩定版) by 大樂 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>智能採買</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="智能採買">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
    .scrollbar-hide::-webkit-scrollbar{display:none;}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .animate-slide-up{animation:slideUp 0.3s ease-out;}
    @keyframes pulse-slow{0%,100%{opacity:1;}50%{opacity:0.5;}}
    .animate-pulse-slow{animation:pulse-slow 2s cubic-bezier(0.4,0,0.6,1) infinite;}
    @keyframes subtle-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
    .animate-subtle-bounce{animation:subtle-bounce 2s ease-in-out infinite;}
    input:focus{font-size:16px!important;}
    .font-serif-tc{font-family:'Noto Serif TC',serif;}
    html,body{position:fixed;inset:0;width:100vw;height:100dvh;overflow:hidden;overscroll-behavior:none;background-color:#047857;-webkit-tap-highlight-color:transparent;}
    #root{width:100%;height:100%;background-color:#f5f5f5;display:flex;justify-content:center;}
    
    /* 拖曳強化：絕對禁止選取文字與系統選單，開放水平滑動 */
    .drag-handle{cursor:move;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
    .draggable-pill{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:pan-x;}
    
    /* 戰術級膠囊按鈕 */
    .btn-capsule-tactical {
      background: linear-gradient(135deg, #f0fdf4 0%, #e8f5e9 100%);
      color: #065f46;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      border: 1.5px solid #10b981;
      -webkit-user-select:none;user-select:none;
    }
    .btn-capsule-tactical:active {
      transform: scale(0.96);
      background: #c8e6c9;
    }
    
    /* 馬卡龍色選取樣式 */
    .macaron-ring-active {
      transform: scale(1.15);
      box-shadow: inset 0 0 0 3px #fff, 0 0 0 4px currentColor;
      z-index: 10;
    }

    /* 鎖定捲軸時的樣式 */
    .lock-scroll {
      overflow-x: hidden !important;
      touch-action: none !important;
    }

    /* 終極安全距離防護 (解決動態島重疊) */
    .safe-pt { padding-top: max(env(safe-area-inset-top), 48px) !important; }
    .safe-pb { padding-bottom: max(env(safe-area-inset-bottom), 24px) !important; }
  </style>
</head>
<body class="antialiased font-sans">
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;background:#f5f5f5;color:#047857;font-family:sans-serif;">
      <div style="width:40px;height:40px;border:4px solid #ecfdf5;border-top:4px solid #047857;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
      <p style="font-weight:bold;letter-spacing:2px;font-size:16px;">智能採買 啟動中...</p>
      <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
    </div>
  </div>

    const { useState, useEffect, useRef, useMemo } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyC36SqZOaZR3iYfMMDg5NQlADKdwEaZ5bk",

    // 24 色馬卡龍色系 (淺色底、深色字、優雅邊框)

      { bg: '#fce7f3', text: '#9f1239', border: '#f472b6' }, // 櫻花粉
      { bg: '#fdf2f8', text: '#831843', border: '#f43f5e' }, // 玫瑰粉

      { bg: '#ffedd5', text: '#7c2d12', border: '#fdba74' }, // 暖橘色
      { bg: '#fff7ed', text: '#9a3412', border: '#fb923c' }, // 杏桃色
      { bg: '#fef3c7', text: '#713f12', border: '#fcd34d' }, // 奶油黃
      { bg: '#fef9c3', text: '#854d0e', border: '#fde047' }, // 檸檬黃
      { bg: '#ecfccb', text: '#3f6212', border: '#bef264' }, // 蘋果綠

      { bg: '#ecfdf5', text: '#065f46', border: '#34d399' }, // 湖水綠
      { bg: '#ccfbf1', text: '#134e4a', border: '#5eead4' }, // 淺湖藍
      { bg: '#cffafe', text: '#164e63', border: '#67e8f9' }, // 冰晶藍
      { bg: '#e0f2fe', text: '#0c4a6e', border: '#7dd3fc' }, // 晴空藍
      { bg: '#dbeafe', text: '#1e3a8a', border: '#93c5fd' }, // 寶寶藍
      { bg: '#eff6ff', text: '#1e40af', border: '#60a5fa' }, // 柔和藍
      { bg: '#e0e7ff', text: '#312e81', border: '#a5b4fc' }, // 勿忘草
      { bg: '#ede9fe', text: '#4c1d95', border: '#c4b5fd' }, // 薰衣草紫
      { bg: '#f3e8ff', text: '#581c87', border: '#d8b4fe' }, // 紫丁香
      { bg: '#fae8ff', text: '#701a75', border: '#f0abfc' }, // 蘭花紫
      { bg: '#fdf4ff', text: '#86198f', border: '#f5d0fe' }, // 芋泥紫
      { bg: '#f1f5f9', text: '#334155', border: '#cbd5e1' }, // 寧靜灰藍
      { bg: '#f3f4f6', text: '#374151', border: '#d1d5db' }, // 雲朵灰
      { bg: '#fafaf9', text: '#44403c', border: '#d6d3d1' }, // 燕麥奶
    ];

    const DEFAULT_TAGS = [
      { n: '全聯', c: 14 },
      { n: '好市多', c: 3 },
      { n: '烘焙', c: 5 },
      { n: '好朋友', c: 9 }
    ];
    const DEFAULT_QUICK = [
      { n: '雞蛋', t: '全聯' },
      { n: '豆腐', t: '全聯' }
    ];

    const generateId = (len = 4) => {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let res = '';
      for (let i = 0; i < len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
      return res;
    };

    const Icons = {
      Cart: ({size=22, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
      Plus: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
      Check: ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
      Clock: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Copy: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
      Share: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
      Settings: ({size=18, className=""}) => (
        <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="currentColor" style={{ display: 'block' }}><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12c0,0.33,0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      ),
      X: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      ChevronDown: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
      ChevronUp: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>,
      GripVertical: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="9" cy="12" r="1.5"></circle><circle cx="9" cy="6" r="1.5"></circle><circle cx="9" cy="18" r="1.5"></circle><circle cx="15" cy="12" r="1.5"></circle><circle cx="15" cy="6" r="1.5"></circle><circle cx="15" cy="18" r="1.5"></circle></svg>,
      Info: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      Edit: ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg>,
      CheckCircle: ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      Smartphone: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><path d="M12 18h.01"/></svg>,
      Coffee: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>,
      BookOpen: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      History: ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5"/><polyline points="12 7 12 12 16 14"/></svg>,
      Refresh: ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [history, setHistory] = useState({});
      const [customTags, setCustomTags] = useState(DEFAULT_TAGS);
      const [quickItems, setQuickItems] = useState(DEFAULT_QUICK);
      const [personalBaseId, setPersonalBaseId] = useState(() => {
        try { return localStorage.getItem('smart_buy_base_id') || generateId(); }
        catch(e) { return generateId(); }
      });
      const [inputValue, setInputValue] = useState('');
      const [qtyValue, setQtyValue] = useState('');
      const [activeTag, setActiveTag] = useState('');
      const [filterTag, setFilterTag] = useState('全部');
      const [isShoppingMode, setIsShoppingMode] = useState(false);
      const [roomPath, setRoomPath] = useState(() => {
        try { return localStorage.getItem('smart_buy_room') || ''; }
        catch(e) { return ''; }
      });
      const [modalState, setModalState] = useState({ type: null, data: null });
      const [msg, setMsg] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [expandedSection, setExpandedSection] = useState('');
      const [modalInput, setModalInput] = useState('');
      const [modalColorIdx, setModalColorIdx] = useState(0);
      const [baseIdEditValue, setBaseIdEditValue] = useState(personalBaseId);
      const [isEditingBaseId, setIsEditingBaseId] = useState(false);
      const [roomPrefix, setRoomPrefix] = useState(personalBaseId);
      const [roomSuffix, setRoomSuffix] = useState('');
      
      const [vDragIdx, setVDragIdx] = useState(null);
      const [vDragOverIdx, setVDragOverIdx] = useState(null);
      const [hDragType, setHDragType] = useState(null);
      const [hDragIdx, setHDragIdx] = useState(null);
      const [hDragOverIdx, setHDragOverIdx] = useState(null);
      
      const dragDidHappen = useRef(false);
      const touchTimer = useRef(null);
      const touchStartPos = useRef({ x: 0, y: 0 });
      const isScrolling = useRef(false);

      const getTagConfig = (tagName) => {
        if (!customTags) return null;
        const found = customTags.find(t => t && t.n === tagName);
        if (found && found.c !== undefined) return MACARON_COLORS[found.c] || MACARON_COLORS[0];
        return null;
      };

      const getTagInlineStyles = (tagName, isOutline = false) => {
        const cfg = getTagConfig(tagName);
        if (!cfg) return { backgroundColor: isOutline ? '#fff' : '#f9fafb', color: '#374151', borderColor: isOutline ? '#d1d5db' : 'transparent', borderWidth: '2px' };
        if (isOutline) {
          return { backgroundColor: '#ffffff', color: cfg.text, borderColor: cfg.border, borderWidth: '2px' };
        }
        return { backgroundColor: cfg.bg, color: cfg.text, borderColor: cfg.border, borderWidth: '2px' };
      };
      
      const [savedRooms, setSavedRooms] = useState(() => {
        try {
          const raw = localStorage.getItem('smart_buy_saved_rooms');
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return parsed.map(r => (typeof r === 'string' ? { code: r, note: '' } : r)).filter(r => r && r.code);
        } catch (e) { return []; }
      });
      
      const headerRoomTitle = useMemo(() => {
        if (!roomPath) return '進入頻道';
        const saved = savedRooms.find(r => r.code === roomPath);
        if (saved && saved.note) return saved.note;
        const parts = roomPath.split('-');
        return parts.length > 1 ? parts[1] : roomPath;
      }, [roomPath, savedRooms]);
      
      const dynamicFilterTags = useMemo(() => {
        const tagsInUse = Array.from(new Set(items.map(item => item.tag))).filter(t => t && t !== '');
        return ['全部', ...(customTags || []).filter(tag => tag && tagsInUse.includes(tag.n)).map(t => t.n)];
      }, [items, customTags]);

      useEffect(() => {
        onAuthStateChanged(auth, u => {
          if (u) setUser(u);
          else signInAnonymously(auth).catch(console.error);
        });
        try { localStorage.setItem('smart_buy_base_id', personalBaseId); } catch(e){}
      }, [personalBaseId]);

      useEffect(() => {
        if (!user) return;
        setIsLoading(true);
        const prefix = roomPath ? `room_${roomPath}` : `user_${user.uid}`;
        const unsubItems = onSnapshot(query(collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', `list_${prefix}`), orderBy('createdAt', 'desc')), snap => {
          setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setIsLoading(false);
        }, (err) => setIsLoading(false));
        const unsubHist = onSnapshot(collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', `hist_${prefix}`), snap => {
          const h = {};
          snap.docs.forEach(d => { const data = d.data(); h[data.name] = data; });
          setHistory(h);
        });
        const unsubConfig = onSnapshot(doc(db, 'artifacts', APP_ID_PATH, 'public', 'data', `config_${prefix}`, 'settings'), snap => {
          if (snap.exists()) {
            const data = snap.data();
            // 過濾舊的異常格式
            if (data.tags) {
              const fixedTags = data.tags.map(t => {
                if (typeof t === 'string') return { n: t, c: 0 };
                return t;
              }).filter(t => t && t.n);
              setCustomTags(fixedTags);
            }
            if (data.quick) {
              const fixedQuick = data.quick.map(q => {
                if (typeof q === 'string') return { n: q, t: '' };
                return q;
              }).filter(q => q && (q.n || q.name));
              setQuickItems(fixedQuick);
            }
          } else {
            setDoc(snap.ref, { tags: DEFAULT_TAGS, quick: DEFAULT_QUICK });
          }
        });
        return () => { unsubItems(); unsubHist(); unsubConfig(); };
      }, [user, roomPath]);
      
      const getConfigRef = () => doc(db, 'artifacts', APP_ID_PATH, 'public', 'data', `config_${roomPath ? `room_${roomPath}` : `user_${user.uid}`}`, 'settings');
      const getItemRef = (id) => doc(db, 'artifacts', APP_ID_PATH, 'public', 'data', `list_${roomPath ? `room_${roomPath}` : `user_${user.uid}`}`, id);
      
      const handleAdd = async (e) => {
        if (e) e.preventDefault();
        if (!inputValue.trim() || !user) return;
        await addDoc(collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', `list_${roomPath ? `room_${roomPath}` : `user_${user.uid}`}`), { name: inputValue.trim(), qty: qtyValue.trim(), tag: activeTag || '', completed: false, postponed: false, createdAt: Date.now() });
        setInputValue(''); setQtyValue('');
      };
      const handleQuickSelect = (qa) => { setInputValue(qa.n || qa.name || ''); setActiveTag(qa.t || qa.tag || ''); };
      const handleComplete = async (item) => { await updateDoc(getItemRef(item.id), { completed: !item.completed, postponed: false }); };
      const handlePostpone = async (e, item) => { e.stopPropagation(); await updateDoc(getItemRef(item.id), { postponed: !item.postponed, completed: false }); };
      
      const savePrice = async (itemName, price, itemTag, itemId) => {
        const prefix = roomPath ? `room_${roomPath}` : `user_${user.uid}`;
        await setDoc(doc(db, 'artifacts', APP_ID_PATH, 'public', 'data', `hist_${prefix}`, itemName), { name: itemName, price: price || '', tag: itemTag || '', updatedAt: Date.now() });
        if (itemId) await updateDoc(getItemRef(itemId), { currentPrice: price || '' });
      };

      const handleAddNewTag = async (tagName, colorIdx, shouldClose = false) => {
        const name = tagName.trim(); if (!name) return;
        if ((customTags || []).some(t => t && t.n === name)) { setMsg('地點已存在！'); setTimeout(() => setMsg(''), 1000); return; }
        const next = [...(customTags || []), { n: name, c: colorIdx }]; await setDoc(getConfigRef(), { tags: next }, { merge: true });
        if (shouldClose) setModalState({ type: null });
        setMsg('新增成功'); setTimeout(() => setMsg(''), 1000);
      };
      const delTag = async (tagName) => { const next = (customTags || []).filter(tag => tag && tag.n !== tagName); await setDoc(getConfigRef(), { tags: next }, { merge: true }); };
      const handleAddNewQuick = async (name, tag, shouldClose = false) => {
        const qName = name.trim(); if (!qName) return;
        const next = [...(quickItems || []).filter(q => q).map(q => ({ n: q.n || q.name, t: q.t || q.tag || '' })), { n: qName, t: tag || '' }];
        await setDoc(getConfigRef(), { quick: next }, { merge: true });
        if (shouldClose) setModalState({ type: null });
        setMsg('新增成功'); setTimeout(() => setMsg(''), 1000);
      };
      const delQuick = async (idx) => { const next = (quickItems || []).filter((_, i) => i !== idx).map(q => ({ n: q?.n || q?.name, t: q?.t || q?.tag || '' })); await setDoc(getConfigRef(), { quick: next }, { merge: true }); };
      
      const handleTuneRoomAttempt = async (prefix, suffix, note = '') => {
        try {
          const p = prefix.trim();
          const s = suffix.trim();
          if (!p && !s) { handleTuneRoom('', ''); return; }
          const finalPath = (p && s) ? `${p}-${s}` : (p || s);
          
          const listRef = collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', `list_room_${finalPath}`);
          const snap = await getDocs(listRef);
          
          // 無論是否在 savedRooms 裡，只要雲端有資料就跳出警報
          if (!snap.empty) {
            setModalState({ type: 'channelConflict', data: { code: finalPath, note, count: snap.size } });
          } else {
            handleTuneRoom(finalPath, note);
          }
        } catch(e) {
          setMsg('連線發生錯誤'); setTimeout(() => setMsg(''), 2000);
        }
      };

      const handleTuneRoom = (code, note = '') => {
        const c = code.trim(); if (!c) { setRoomPath(''); try{localStorage.removeItem('smart_buy_room');}catch(e){} setModalState({ type: null }); return; }
        setRoomPath(c); try{localStorage.setItem('smart_buy_room', c);}catch(e){}
        setSavedRooms(prev => {
          const next = [{ code: c, note: note || '' }, ...prev.filter(r => r.code !== c)];
          try{localStorage.setItem('smart_buy_saved_rooms', JSON.stringify(next));}catch(e){}
          return next;
        });
        setModalState({ type: null }); setMsg(`連線成功`); setTimeout(() => setMsg(''), 1000);
      };

      const handleClearChannelData = async (code) => {
        const listRef = collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', `list_room_${code}`);
        const snap = await getDocs(listRef);
        for (const d of snap.docs) { await deleteDoc(d.ref); }
        setMsg('頻道已淨空');
        handleTuneRoom(code, modalState.data.note);
      };

      const handleUpdateBaseId = (newVal) => {
        const val = newVal.trim(); if (!val) return;
        setPersonalBaseId(val); setBaseIdEditValue(val); setRoomPrefix(val); try{localStorage.setItem('smart_buy_base_id', val);}catch(e){}
        setMsg('ID 已固定'); setTimeout(() => setMsg(''), 1000);
      };
      const clearCompleted = async () => {
        if (!user) return; const toDelete = items.filter(i => i.completed);
        for (const item of toDelete) await deleteDoc(getItemRef(item.id));
        setMsg('已清除完成項目'); setTimeout(() => setMsg(''), 1000);
      };
      const resetAllTagsColor = async () => {
        const next = (customTags || []).map(t => ({ ...t, c: 0 }));
        setCustomTags(next);
        await setDoc(getConfigRef(), { tags: next }, { merge: true });
        setMsg('已還原預設色'); setTimeout(() => setMsg(''), 1000);
      };
      
      const handleShareApp = async () => {
        const shareText = '推薦給你這個超好用的智能採買 APP！\n(請向建立者索取專屬頻道代號喔)';
        if (navigator.share) {
          try {
            await navigator.share({
              title: '智能採買',
              text: shareText
            });
          } catch(err) {
            console.log('Share canceled', err);
          }
        } else {
          // 加入防捲動保護的臨時複製區
          const tempIn = document.createElement('textarea'); 
          tempIn.value = shareText; 
          tempIn.style.position = 'fixed';
          tempIn.style.top = '0';
          document.body.appendChild(tempIn); 
          tempIn.select(); 
          document.execCommand('copy'); 
          document.body.removeChild(tempIn);
          setMsg('推薦文字已複製！'); setTimeout(() => setMsg(''), 2500);
        }
      };
      
      const handleForceUpdate = () => {
        setMsg('重整中...');
        if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(r => { for (let rg of r) rg.unregister(); }); }
        setTimeout(() => { window.location.reload(true); }, 1500);
      };

      const onTouchStartH = (e, idx, type) => {
        touchStartPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        isScrolling.current = false; dragDidHappen.current = false;
        touchTimer.current = setTimeout(() => {
          if (!isScrolling.current) {
            setHDragIdx(idx); setHDragType(type); dragDidHappen.current = true;
            if (navigator.vibrate) navigator.vibrate(40);
          }
        }, 400);
      };
      const onTouchMoveH = (e, attr) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartPos.current.x);
        const dy = Math.abs(e.touches[0].clientY - touchStartPos.current.y);
        if (hDragIdx === null) { if (dx > 8 || dy > 8) { isScrolling.current = true; clearTimeout(touchTimer.current); } return; }
        e.preventDefault();
        const target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        const dropElem = target?.closest(`[${attr}]`);
        if (dropElem) {
          const overIdx = parseInt(dropElem.getAttribute(attr), 10);
          if (overIdx !== hDragOverIdx) setHDragOverIdx(overIdx);
        }
      };
      const onTouchEndH = async (type) => {
        clearTimeout(touchTimer.current);
        if (hDragIdx !== null && hDragOverIdx !== null && hDragIdx !== hDragOverIdx) {
          if (type === 'tag') {
            const next = [...customTags]; const [moved] = next.splice(hDragIdx, 1); next.splice(hDragOverIdx, 0, moved);
            setCustomTags(next); await setDoc(getConfigRef(), { tags: next }, { merge: true });
          } else {
            const next = [...quickItems]; const [moved] = next.splice(hDragIdx, 1); next.splice(hDragOverIdx, 0, moved);
            setQuickItems(next); await setDoc(getConfigRef(), { quick: next }, { merge: true });
          }
        }
        setHDragIdx(null); setHDragOverIdx(null); setHDragType(null);
      };
      
      const onVStart = (idx) => { setVDragIdx(idx); if (navigator.vibrate) navigator.vibrate(30); };
      const onVMove = (e, attr) => {
        if (vDragIdx === null) return; e.preventDefault();
        const touch = e.touches[0]; const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const dropElem = target?.closest(`[${attr}]`);
        if (dropElem) { const hoverIdx = parseInt(dropElem.getAttribute(attr), 10); if (hoverIdx !== vDragOverIdx) setVDragOverIdx(hoverIdx); }
      };
      const onVEnd = async (type) => {
        if (vDragIdx !== null && vDragOverIdx !== null && vDragIdx !== vDragOverIdx) {
          if (type === 'tag') {
            const next = [...customTags]; const [moved] = next.splice(vDragIdx, 1); next.splice(vDragOverIdx, 0, moved);
            setCustomTags(next); await setDoc(getConfigRef(), { tags: next }, { merge: true });
          } else if (type === 'quick') {
            const next = [...quickItems]; const [moved] = next.splice(vDragIdx, 1); next.splice(vDragOverIdx, 0, moved);
            setQuickItems(next); await setDoc(getConfigRef(), { quick: next }, { merge: true });
          } else if (type === 'room') {
            const next = [...savedRooms]; const [moved] = next.splice(vDragIdx, 1); next.splice(vDragOverIdx, 0, moved);
            setSavedRooms(next); try{localStorage.setItem('smart_buy_saved_rooms', JSON.stringify(next));}catch(e){}
          }
        }
        setVDragIdx(null); setVDragOverIdx(null);
      };

      const filteredItems = items.filter(item => filterTag === '全部' ? true : item.tag === filterTag);
      
      const scrollContainerClass = (type) => {
        if (hDragIdx !== null && hDragType === type) return 'lock-scroll';
        return 'overflow-x-auto scrollbar-hide';
      };

      return (
        <div className="w-full h-full flex justify-center bg-neutral-100 font-sans text-neutral-800">
          {msg && (
            <div className="fixed top-10 left-1/2 -translate-x-1/2 bg-neutral-800/90 text-white px-6 py-2.5 rounded-full text-base font-bold shadow-2xl z-[200] animate-slide-up whitespace-nowrap font-serif-tc">
              {msg}
            </div>
          )}

          <div className="w-full max-w-md bg-white h-full flex flex-col relative shadow-2xl sm:border-x border-neutral-200 z-0 overflow-hidden">
            <header className="bg-emerald-700 text-white shrink-0 shadow-lg z-20 safe-pt">
              <div className="px-4 py-3 sm:py-4 flex justify-between items-center h-auto min-h-[64px]">
                <div className="flex items-center gap-2 font-bold">
                  <Icons.Cart />
                  <h1 className="text-xl sm:text-2xl tracking-tight font-serif-tc">智能採買</h1>
                  <button onClick={() => setModalState({ type: 'about' })} className="px-3 py-1.5 bg-blue-500 text-white rounded-xl text-sm sm:text-base font-bold shadow-md ml-1 flex items-center gap-1.5 active:scale-90 transition-all">
                    <Icons.Info size={16} /> 使用說明
                  </button>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => { 
                    setModalInput(''); setIsEditingBaseId(false); setBaseIdEditValue(personalBaseId); setRoomPrefix(personalBaseId); setRoomSuffix('');
                    setModalState({ type: 'room' }); 
                  }} className={`px-2.5 py-1.5 rounded-lg text-sm sm:text-base font-bold transition-all active:scale-95 shadow-sm ${roomPath ? 'bg-amber-400 text-amber-900' : 'bg-emerald-600 text-white border border-emerald-500'}`}>
                    {headerRoomTitle}
                  </button>
                </div>
              </div>
            </header>

            {!isShoppingMode && (
              <div className="bg-white px-3 pt-2 pb-1.5 shadow-sm relative z-10 shrink-0 border-b border-emerald-100">
                <form onSubmit={handleAdd} className="flex gap-2 items-center mb-1">
                  <input type="text" value={inputValue} onChange={e => setInputValue(e.target.value)} placeholder="要買或要做什麼？" className="flex-1 min-w-0 p-3.5 rounded-2xl border border-neutral-200 shadow-sm outline-none text-base sm:text-lg font-bold bg-white focus:border-emerald-500 text-neutral-700 placeholder-neutral-400" />
                  <input type="text" value={qtyValue} onChange={e => setQtyValue(e.target.value)} placeholder="數量" className="w-16 sm:w-20 p-3.5 rounded-2xl border border-neutral-200 shadow-sm text-center outline-none text-base font-bold bg-white focus:border-emerald-500 text-neutral-700 placeholder-neutral-400" />
                </form>
                
                <div className={`flex items-center gap-2 relative ${scrollContainerClass('quick')} py-0.5 mt-0.5`}>
                  <div className="sticky left-0 bg-white pr-1 z-10 flex items-center justify-center">
                    <button type="button" onClick={() => setModalState({ type: 'manageQuick' })} className="shrink-0 text-emerald-700 w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm border border-neutral-100 active:scale-95"><Icons.Settings size={18} /></button>
                  </div>
                  {quickItems && quickItems.map((qa, i) => {
                    if(!qa || !qa.n) return null;
                    return (
                    <button key={i} data-h-quick-idx={i} onTouchStart={(e) => onTouchStartH(e, i, 'quick')} onTouchMove={(e) => onTouchMoveH(e, 'data-h-quick-idx')} onTouchEnd={() => onTouchEndH('quick')} onTouchCancel={() => onTouchEndH('quick')} onClick={() => { if(!dragDidHappen.current) handleQuickSelect(qa); }} className={`shrink-0 draggable-pill whitespace-nowrap px-3.5 py-1 rounded-full text-sm font-bold transition-all shadow-sm bg-orange-50 border border-orange-200 text-orange-600 active:scale-95 ${hDragIdx === i && hDragType === 'quick' ? 'scale-110 opacity-60 z-50 shadow-md' : ''} ${hDragOverIdx === i && hDragType === 'quick' ? 'border-2 border-dashed border-orange-500' : ''}`}>+ {qa.n || qa.name}</button>
                    )
                  })}
                  <button type="button" onClick={() => { setModalInput(''); setModalState({ type: 'addQuick' }); }} className="shrink-0 px-3.5 py-1 rounded-full text-sm font-bold text-orange-500 bg-white border border-dashed border-orange-300 active:scale-95 whitespace-nowrap">+ 自訂</button>
                </div>
                
                <div className={`flex items-center gap-2 relative ${scrollContainerClass('tag')} py-0.5 mt-0.5`}>
                  <div className="sticky left-0 bg-white pr-1 z-10 flex items-center justify-center">
                    <button type="button" onClick={() => setModalState({ type: 'manageTag' })} className="shrink-0 text-emerald-700 w-8 h-8 flex items-center justify-center bg-white rounded-full shadow-sm border border-neutral-100 active:scale-95"><Icons.Settings size={18} /></button>
                  </div>
                  {customTags && customTags.map((t, idx) => {
                    if(!t || !t.n) return null;
                    const isSelected = activeTag === t.n;
                    const style = getTagInlineStyles(t.n, !isSelected);
                    return (
                      <button key={t.n} data-h-tag-idx={idx} onTouchStart={(e) => onTouchStartH(e, idx, 'tag')} onTouchMove={(e) => onTouchMoveH(e, 'data-h-tag-idx')} onTouchEnd={() => onTouchEndH('tag')} onTouchCancel={() => onTouchEndH('tag')} onClick={() => { if(!dragDidHappen.current) setActiveTag(isSelected ? '' : t.n); }} className={`shrink-0 draggable-pill px-3.5 py-1 rounded-full text-sm font-bold whitespace-nowrap transition-all border-2 active:scale-95 shadow-sm ${hDragIdx === idx && hDragType === 'tag' ? 'scale-110 opacity-60 z-50 shadow-md' : ''} ${hDragOverIdx === idx && hDragType === 'tag' ? 'border-dashed' : ''}`} style={style}>{t.n}</button>
                    )
                  })}
                  <button type="button" onClick={() => { setModalInput(''); setModalColorIdx(0); setModalState({ type: 'addTag' }); }} className="shrink-0 px-3 py-1 rounded-full text-sm font-bold text-emerald-600 bg-white border border-dashed border-emerald-300 active:scale-95 flex items-center justify-center"><Icons.Plus size={16} /></button>
                </div>
                
                <div className="flex gap-2 mt-2 mb-1 px-1">
                  <button onClick={() => setIsShoppingMode(true)} className="flex-[0.8] py-2.5 bg-emerald-50 text-emerald-700 font-bold rounded-xl flex items-center justify-center gap-1.5 active:scale-95 transition-transform text-sm shadow-sm border border-emerald-100">
                    <Icons.ChevronUp size={18} /> 收起
                  </button>
                  <button onClick={handleAdd} className="flex-[1.2] py-2.5 bg-emerald-800 text-white font-bold rounded-xl flex items-center justify-center gap-1.5 shadow-md active:scale-95 transition-transform text-sm">
                    <Icons.Plus size={18} /> 新增
                  </button>
                </div>
              </div>
            )}

            {isShoppingMode && (
              <div className="bg-white px-4 py-2 shadow-sm relative z-10 shrink-0 flex justify-center border-b border-neutral-100">
                 <button onClick={() => setIsShoppingMode(false)} className="flex items-center gap-2 text-emerald-700 font-bold bg-emerald-50 px-6 py-2 rounded-full active:scale-95 transition-transform border border-emerald-200 shadow-sm text-sm">
                     <Icons.ChevronDown size={18}/> 展開新增清單
                 </button>
              </div>
            )}

            {dynamicFilterTags.length > 1 && (
              <div className="bg-white flex overflow-x-auto scrollbar-hide shrink-0 z-10 px-3 pt-3 gap-1.5 border-b-2 border-emerald-700/10">
                {dynamicFilterTags.map(tagName => {
                  const isSelected = filterTag === tagName;
                  const cfg = tagName === '全部' ? { bg: '#ecfdf5', text: '#065f46', border: '#10b981' } : (getTagConfig(tagName) || { bg: '#f1f5f9', text: '#334155', border: '#cbd5e1' });
                  
                  const activeStyle = { backgroundColor: cfg.bg, color: cfg.text, borderColor: cfg.border, borderBottomColor: 'transparent' };
                  const inactiveStyle = { backgroundColor: '#fff', color: cfg.text, borderColor: 'transparent' };
                  
                  return (
                    <button 
                      key={`filter-${tagName}`} 
                      onClick={() => setFilterTag(tagName)} 
                      className={`relative px-4 py-2 text-base sm:text-lg font-bold transition-all rounded-t-xl whitespace-nowrap border-x-2 border-t-2 ${isSelected ? 'shadow-sm z-20' : 'opacity-80 hover:opacity-100 mt-1'}`}
                      style={isSelected ? activeStyle : inactiveStyle}
                    >
                      {tagName}
                      {isSelected && (
                        <div className="absolute -bottom-[12px] left-1/2 -translate-x-1/2 border-[6px] border-transparent" style={{ borderTopColor: cfg.border }}></div>
                      )}
                    </button>
                  );
                })}
              </div>
            )}

            <main className="p-2 space-y-2.5 bg-neutral-50/50 flex-1 overflow-y-auto pb-24 relative">
              {isLoading && (
                <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/60 backdrop-blur-[1px] animate-pulse-slow">
                  <div className="w-10 h-10 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin mb-3"></div>
                  <p className="text-emerald-700 font-bold text-base tracking-widest font-serif-tc">載入中...</p>
                </div>
              )}
              
              {filteredItems.map(item => (
                <div key={item.id} className={`flex items-start gap-2.5 p-3 rounded-xl border transition-all ${item.completed ? 'bg-neutral-100 border-neutral-200 opacity-60' : item.postponed ? 'bg-amber-50 border-amber-200 shadow-inner' : 'bg-white shadow-sm'}`} style={{ borderLeftWidth: '8px', borderLeftColor: (!item.completed && !item.postponed) ? (getTagConfig(item.tag)?.border || '#d1d5db') : undefined }}>
                  <div className="flex flex-col items-center gap-3 shrink-0 mt-0.5">
                    <div onClick={() => handleComplete(item)} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-colors cursor-pointer active:scale-90 ${item.completed ? 'bg-emerald-600 border-emerald-600 text-white shadow-inner' : 'border-neutral-300 bg-white'}`}>{item.completed && <Icons.Check size={20} />}</div>
                    {!item.completed && <button onClick={(e) => handlePostpone(e, item)} className={`p-1.5 rounded-lg transition-colors active:scale-75 ${item.postponed ? 'text-amber-500 bg-amber-100' : 'text-neutral-400 bg-neutral-50/50'}`}><Icons.Clock size={18} /></button>}
                  </div>
                  <div className="flex flex-col min-w-0 flex-1 gap-1.5 w-full">
                    <div className="flex items-center justify-between gap-1 w-full">
                      <div className="flex items-center gap-1.5 min-w-0 flex-1">
                        <span onClick={() => handleComplete(item)} className={`text-xl sm:text-2xl font-bold truncate cursor-pointer ${item.completed ? 'line-through text-neutral-400' : item.postponed ? 'text-amber-800' : 'text-neutral-800'}`}>{item.name}</span>
                        {item.qty && <span className="text-base px-2 py-0.5 rounded font-bold whitespace-nowrap shrink-0 bg-white/50 text-neutral-600 shadow-sm border border-black/5">{item.qty}</span>}
                      </div>
                      {!item.completed && <button onClick={(e) => { e.stopPropagation(); setModalInput(item.currentPrice || ''); setModalState({ type: 'recordingPrice', data: item }); }} className={`px-2.5 py-1 rounded-lg text-sm font-bold active:scale-90 shrink-0 whitespace-nowrap shadow-sm ${item.currentPrice ? 'bg-white text-emerald-700 border border-emerald-200' : 'bg-amber-100 text-amber-700'}`}>{item.currentPrice ? `$${item.currentPrice}` : '記 $'}</button>}
                    </div>
                    <div className="flex items-center justify-between gap-1 w-full">
                      <div className="flex items-center gap-1.5 min-w-0 flex-1">
                        <button onClick={(e) => { e.stopPropagation(); setModalState({ type: 'editingTag', data: item }); }} className={`shrink-0 text-xs px-2.5 py-1 rounded-full font-bold active:scale-95 transition-transform flex items-center gap-1 border-2 ${item.completed ? 'bg-neutral-200 text-neutral-400 border-neutral-300' : ''}`} style={!item.completed ? getTagInlineStyles(item.tag, false) : {}}>{item.tag && item.tag !== '無' ? item.tag : '+地點'}</button>
                        {history[item.name] && !item.completed && <span className="text-xs font-bold truncate text-right whitespace-nowrap font-serif-tc" style={{ color: getTagConfig(item.tag)?.text || '#9f1239' }}>上次：${history[item.name].price} {history[item.name].tag ? `(${history[item.name].tag})` : ''}</span>}
                      </div>
                      <button onClick={() => deleteDoc(getItemRef(item.id))} className="p-2 text-neutral-300 hover:text-red-500 active:scale-75 shrink-0"><Icons.Trash size={20} /></button>
                    </div>
                  </div>
                </div>
              ))}
              {items.some(i => i.completed) && (
                <div className="pt-4 flex justify-center w-full">
                  <button onClick={clearCompleted} className="flex items-center gap-2 px-8 py-3 text-red-500 bg-white border border-red-100 rounded-full font-bold active:scale-95 shadow-sm text-base"><Icons.Trash size={18} /> 清除已買項目</button>
                </div>
              )}
            </main>

            {modalState.type && (
              <div className="fixed inset-0 bg-black/70 z-[120] flex items-end sm:items-center justify-center backdrop-blur-md" onClick={() => { setModalState({ type: null, data: null }); setExpandedSection(''); }}>
                <div className="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-3xl p-5 pb-10 shadow-2xl animate-slide-up flex flex-col max-h-[85vh] overflow-hidden mt-12 safe-pb" onClick={e => e.stopPropagation()}>

                                  <div className="flex gap-2 overflow-x-auto scrollbar-hide py-2 px-2">
                                    {MACARON_COLORS.map((cfg, ci) => (
                                      <div key={ci} onClick={async () => { const next = [...customTags]; next[idx].c = ci; setCustomTags(next); await setDoc(getConfigRef(), { tags: next }, { merge: true }); }} className={`w-8 h-8 shrink-0 rounded-full transition-all`} style={{ backgroundColor: cfg.bg, boxShadow: item.c === ci ? `0 0 0 2px #fff, 0 0 0 4px ${cfg.border}` : 'inset 0 0 0 1px rgba(0,0,0,0.1)' }} />
                                    ))}
                                  </div>
                                </div>
                              </div>
                              <button onClick={() => delTag(item.n)} className="p-3 active:scale-75 opacity-60"><Icons.Trash size={24} /></button>
                            </div>
                          )})}
                        </div>
                      </div>
                    )}
                    
                    {modalState.type === 'manageQuick' && (
                      <div className="flex flex-col h-full gap-4 px-1 font-bold">
                        <div className="flex flex-col gap-3 mb-4 shrink-0 bg-amber-50 p-4 rounded-2xl border-2 border-amber-100 shadow-sm relative font-bold">
                          <p className="text-lg font-bold text-amber-900 font-serif-tc">快速新增常用品項</p>
                          <input type="text" id="mAddQuick" placeholder="物品名稱..." className="w-full p-3.5 rounded-xl border-2 border-amber-200 outline-none text-xl font-bold bg-white shadow-inner font-bold" />
                          <div className="flex gap-3 font-bold">
                            <select id="mAddQuickTag" className="flex-1 min-w-0 p-3.5 bg-white rounded-xl border-2 border-amber-200 font-bold text-lg outline-none shadow-sm">
                              <option value="">無地點</option>
                              {(customTags || []).map(t => t ? <option key={t.n} value={t.n}>{t.n}</option> : null)}
                            </select>
                            <button onClick={() => { const n = document.getElementById('mAddQuick').value; const t = document.getElementById('mAddQuickTag').value; if (n) { handleAddNewQuick(n, t, false); document.getElementById('mAddQuick').value = ''; } }} className="shrink-0 bg-amber-600 text-white px-8 rounded-xl font-bold text-xl active:scale-95 shadow-md font-bold">新增</button>
                          </div>
                        </div>
                        <div className="space-y-2 pb-10 px-1 font-bold" onTouchMove={(e) => onVMove(e, 'data-v-quick-idx')}>
                           <p className="text-sm font-bold text-neutral-500 px-1">已存品項 (長按圖示拖曳)：</p>
                          {(quickItems || []).map((item, idx) => {
                            if(!item) return null;
                            return (
                            <div key={idx} data-v-quick-idx={idx} className={`flex justify-between items-center p-3.5 rounded-2xl border-2 bg-neutral-50 shadow-sm border-neutral-100 ${vDragIdx === idx ? 'opacity-90 scale-105 shadow-xl z-50 relative' : ''} ${vDragOverIdx === idx && vDragIdx !== idx ? 'border-dashed scale-95 opacity-70 border-emerald-500' : ''}`}>
                              <div className="flex items-center gap-2 flex-1">
                                <div className="p-3 text-neutral-400 drag-handle" onTouchStart={(e) => onVStart(idx)} onTouchEnd={() => onVEnd('quick')} onTouchCancel={() => onVEnd('quick')}><Icons.GripVertical size={20}/></div>
                                <span className="font-bold text-xl px-1">{item.n || item.name}</span>
                              </div>
                              <button onClick={() => delQuick(idx)} className="p-3 active:scale-75 opacity-50"><Icons.Trash size={24} /></button>
                            </div>
                          )})}
                        </div>
                      </div>
                    )}

                    {modalState.type === 'recordingPrice' && modalState.data && (
                      <div className="space-y-6 py-4 text-center font-bold px-1 font-serif-tc">
                        <div className="mb-2"><span className="text-xl font-bold text-amber-900 bg-[#FFDD00] px-10 py-4 rounded-full shadow-lg tracking-widest font-serif-tc">💰 {modalState.data.name}</span></div>
                        <p className="text-lg text-neutral-600 font-bold px-4 leading-relaxed underline underline-offset-4 decoration-amber-300 decoration-2">錄入本次價格，系統自動記憶。下次再買同樣東西，會告訴你上次買多少，讓你買得更聰明。</p>
                        <input type="number" value={modalInput} onChange={e => setModalInput(e.target.value)} placeholder="輸入金額..." className="w-full p-6 rounded-2xl border-4 border-amber-200 outline-none text-4xl text-center bg-amber-50/30 shadow-inner font-bold text-amber-900" />
                        <button onClick={async () => { await savePrice(modalState.data.name, modalInput, modalState.data.tag, modalState.data.id); setModalState({ type: null }); }} className="w-full bg-amber-600 text-white py-5 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">確定錄入</button>
                      </div>
                    )}
                    
                    {modalState.type === 'donate' && (
                      <div className="space-y-8 py-6 text-center font-bold px-1">
                        <div className="bg-amber-50 p-6 rounded-2xl border-2 border-amber-200 shadow-inner font-serif-tc">
                          <Icons.Coffee size={32} className="mx-auto mb-2 text-amber-700" />
                          <p className="text-xl text-amber-900 font-bold mb-4">謝謝你的心意！ 🥰</p>
                          <div className="inline-block bg-amber-500 text-white text-base px-6 py-2.5 rounded-full font-bold shadow-md shadow-amber-200 leading-tight">
                            一杯咖啡 $50<br/><span className="text-xs opacity-90 font-sans">(杯數隨喜)</span>
                          </div>
                        </div>
                        <div className="bg-neutral-50 p-6 rounded-2xl border-2 border-neutral-100 space-y-4 shadow-sm font-bold">
                          <p className="text-xl font-bold text-neutral-800 tracking-wider font-mono">永豐銀行 (807)<br />204-018-0025253-1</p>
                          <button onClick={() => { 
                            const temp = document.createElement('input'); 
                            temp.style.position = 'fixed'; temp.style.top = '0';
                            temp.value = '20401800252531'; 
                            document.body.appendChild(temp); 
                            temp.select(); 
                            document.execCommand('copy'); 
                            document.body.removeChild(temp); 
                            setMsg('帳號已複製！'); setTimeout(() => setMsg(''), 2000); 
                          }} className="w-full bg-amber-500 text-white py-5 rounded-2xl text-xl font-bold active:scale-95 shadow-xl flex justify-center items-center gap-2">📋 一鍵複製帳號</button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
